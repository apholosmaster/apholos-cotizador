<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APHOLOS — Cotizador 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#0f1f35;--navy2:#1a3450;--blue:#1d6fb8;--accent:#c8993a;--light:#f4f6f9;--border:#dde3ec;--text:#1a2535;--muted:#64748b;--white:#fff;--radius:8px;--sidebar:300px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--light);color:var(--text);min-height:100vh;font-size:13px;}
header{background:var(--navy);padding:0 28px;height:58px;display:flex;align-items:center;gap:14px;border-bottom:2px solid var(--accent);position:sticky;top:0;z-index:200;}
.logo{width:34px;height:34px;background:var(--accent);border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;color:var(--navy);font-size:17px;font-weight:800;flex-shrink:0;}
header h1{font-family:'Syne',sans-serif;color:white;font-size:17px;font-weight:700;}
header .tag{font-size:10px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;font-weight:600;}
.hcount{margin-left:auto;background:rgba(255,255,255,.12);color:white;border-radius:20px;padding:4px 14px;font-size:12px;font-weight:500;white-space:nowrap;}
.hcount span{color:var(--accent);font-weight:700;}
.layout{display:flex;min-height:calc(100vh - 58px);}
aside{width:var(--sidebar);min-width:var(--sidebar);background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto;}
.sidebar-header{padding:16px 18px 12px;border-bottom:1px solid var(--border);}
.sidebar-header h2{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:1px;}
.filters-body{padding:12px 14px;flex:1;}
.fg{margin-bottom:14px;}
.fg>label.fg-label{display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:5px;}
.fg input[type=text],.fg select{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--radius);font-family:'Inter',sans-serif;font-size:12.5px;color:var(--text);background:var(--light);outline:none;transition:border-color .2s,box-shadow .2s;cursor:pointer;}
.fg input[type=text]{cursor:text;}
.fg input[type=text]:focus,.fg select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,111,184,.12);background:white;}
.ms{border:1.5px solid var(--border);border-radius:var(--radius);background:var(--light);max-height:140px;overflow-y:auto;padding:4px 0;}
.ms-item{display:flex;align-items:center;gap:8px;padding:6px 10px;font-size:12px;color:var(--text);cursor:pointer;transition:background .12s;user-select:none;}
.ms-item:hover{background:#eef4ff;}
.ms-item input[type=checkbox]{width:14px;height:14px;accent-color:var(--blue);flex-shrink:0;cursor:pointer;margin:0;}
.ms::-webkit-scrollbar{width:4px;}
.ms::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px;}
.qty-pills{display:flex;flex-wrap:wrap;gap:5px;padding:4px 0;}
.qty-pill{display:inline-flex;align-items:center;padding:4px 10px;border:1.5px solid var(--border);border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;background:var(--light);color:var(--text);user-select:none;}
.qty-pill.active{background:var(--navy);border-color:var(--navy);color:white;}
.qty-pill:hover:not(.active){border-color:var(--blue);color:var(--blue);}
.qty-all-btn{font-size:10px;color:var(--blue);font-weight:600;cursor:pointer;text-decoration:underline;margin-left:4px;}
.sel-count{font-size:10px;color:var(--blue);font-weight:600;margin-left:4px;}

.reset-btn{width:100%;padding:9px;background:var(--navy);color:white;border:none;border-radius:var(--radius);font-family:'Inter',sans-serif;font-size:12.5px;font-weight:500;cursor:pointer;margin-top:6px;transition:background .2s;}
.reset-btn:hover{background:var(--navy2);}
main{flex:1;padding:20px 24px;overflow-x:auto;min-width:0;}
.main-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.main-header h2{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;}
.badge-count{background:var(--blue);color:white;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600;}
.no-results{text-align:center;padding:80px 20px;color:var(--muted);}
.no-results .icon{font-size:44px;margin-bottom:12px;}

table{width:100%;border-collapse:collapse;}
thead th{background:var(--navy);color:white;padding:10px 12px;text-align:left;font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;white-space:nowrap;position:sticky;top:0;z-index:2;}
thead th.pc{background:var(--navy2);text-align:center;min-width:80px;}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:#eef5ff !important;}
td{padding:9px 12px;vertical-align:middle;}
td.desc{max-width:260px;line-height:1.4;font-size:12.5px;}
td.price{text-align:center;font-weight:600;font-size:13px;white-space:nowrap;}
td.price.has{background:#eef4ff;color:#1a4f82;}
td.price.no{color:#d1dae8;font-size:11px;}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;white-space:nowrap;}
.b-STOPPER{background:#dbeafe;color:#1e40af;}.b-ETIQUETA{background:#dcfce7;color:#166534;}.b-MUSELET{background:#fef3c7;color:#92400e;}.b-ACCESSORY{background:#ede9fe;color:#5b21b6;}.b-LOOP{background:#fef3c7;color:#92400e;}
.cork-tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:500;}
.ck-syn{background:#e0f2fe;color:#0369a1;}.ck-mic{background:#fef9c3;color:#854d0e;}.ck-nat{background:#dcfce7;color:#166534;}.ck-gpi{background:#fce7f3;color:#9d174d;}
.orig-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;}
.o-dong{background:#eff6ff;color:#1d4ed8;}.o-bsas{background:#f0fdf4;color:#15803d;}
.ag-tag{font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;white-space:nowrap;}
.ag-mino{background:#ddeeff;color:#1a4f82;}.ag-luc{background:#e8f5e9;color:#2e7d32;}.ag-stef{background:#fff8e1;color:#f57f17;}.ag-eno{background:#fce4ec;color:#880e4f;}.ag-acc{background:#ede9fe;color:#5b21b6;}
tr.rt-STOPPER{background:#f8faff;}tr.rt-ETIQUETA{background:#f8fff8;}tr.rt-MUSELET{background:#fffdf5;}tr.rt-ACCESSORY{background:#fdf8ff;}tr.rt-LOOP{background:#fffdf5;}
aside::-webkit-scrollbar{width:4px;}aside::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px;}
/* Selection checkbox */
td.sel-cell, th.sel-cell {
  width: 36px; min-width: 36px; text-align: center;
  padding: 4px 6px; vertical-align: middle;
}
input.row-check {
  width: 16px; height: 16px; cursor: pointer;
  accent-color: var(--blue);
}
/* Quote button bar */
.quote-bar {
  display: none;
  align-items: center; gap: 12px;
  background: var(--navy); color: white;
  padding: 10px 16px; border-radius: var(--radius);
  margin-bottom: 12px; flex-wrap: wrap;
  position: sticky; top: 0; z-index: 50;
  box-shadow: 0 4px 12px rgba(0,0,0,.3);
}
.quote-bar.visible { display: flex; }
.quote-bar .qb-info { font-size: 13px; font-weight: 500; flex: 1; }
.quote-bar .qb-info span { color: var(--accent); font-weight: 700; }
.quote-btn {
  padding: 8px 18px; border: none; border-radius: 6px;
  font-family: 'Inter', sans-serif; font-size: 12px;
  font-weight: 600; cursor: pointer; transition: all .2s;
}
.quote-btn.primary { background: var(--accent); color: var(--navy); }
.quote-btn.primary:hover { background: #e0aa42; }
.quote-btn.secondary { background: rgba(255,255,255,.15); color: white; }
.quote-btn.secondary:hover { background: rgba(255,255,255,.25); }

/* Quote modal overlay */
.quote-modal {
  display: none; position: fixed; inset: 0;
  background: white; z-index: 2000;
  overflow-y: auto; padding: 0;
  box-sizing: border-box;
}
.quote-modal.open { display: block; }
.quote-modal.open { display: block; }
.quote-modal.open { display: block; }
.quote-modal-inner {
  background: white;
  max-width: 100%; margin: 0;
  width: 100%;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
}

/* ── QUOTE PRINT STYLES ── */
.quote-header-bar {
  background: #000000; padding: 16px 32px; box-sizing: border-box;
  display: flex; align-items: center; justify-content: space-between;
}
.quote-header-bar img { height: 36px; filter: invert(1); }
.quote-header-bar .co-title {
  font-family: 'Syne', sans-serif;
  font-size: 16px; font-weight: 700;
  color: white; letter-spacing: 1px; text-transform: lowercase;
  white-space: nowrap;
}
.quote-meta {
  padding: 10px 32px;
  border-bottom: 1px solid #e2e8f0;
  display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-end;
  background: white;
  box-sizing: border-box;
}
.quote-meta-field { display: flex; flex-direction: column; gap: 2px; }
.quote-meta-field label {
  font-size: 8px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: #64748b;
}
.quote-meta-field input, .quote-meta-field select {
  border: 1px solid #e2e8f0; border-radius: 4px;
  padding: 4px 8px; font-family: 'Inter', sans-serif;
  font-size: 12px; color: #1a2535; outline: none;
  min-width: 120px;
}
.quote-meta-field input:focus, .quote-meta-field select:focus {
  border-color: #1d6fb8; box-shadow: 0 0 0 2px rgba(29,111,184,.1);
}
.quote-body { padding: 12px 0; flex: 0 0 auto; }
.quote-body h3 {
  font-family: 'Syne', sans-serif; font-size: 11px;
  font-weight: 700; color: #0f1f35; text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 8px;
  padding-bottom: 4px; border-bottom: 2px solid #0f1f35;
}
.quote-items-table {
  width: 100%; border-collapse: collapse; font-size: 11px;
  margin-bottom: 0; table-layout: auto;
}
.quote-items-table th {
  background: #1a2535; color: white; padding: 8px 10px;
  text-align: left; font-size: 9px; font-weight: 700;
  letter-spacing: .8px; text-transform: uppercase; white-space: nowrap;
}
.quote-items-table td {
  padding: 6px 8px; border-bottom: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0;
  vertical-align: top; font-size: 11px;
}
.quote-items-table td:first-child { border-left: 1px solid #e2e8f0; }
.quote-items-table th { border-right: 1px solid rgba(255,255,255,0.15); }
.quote-items-table tr { page-break-inside: avoid; break-inside: avoid; }
.quote-items-table tr:nth-child(even) td { background: #f8fafc; }
.quote-items-table .price-cell {
  font-weight: 700;
  color: #1a2535; text-align: center; white-space: nowrap;
}
.quote-items-table .qty-row td { padding: 4px 10px; font-size: 10px; }
@media print { .no-print-hide { display: none !important; } }
.quote-items-table img.qt-thumb {
  width: 72px; height: 72px; object-fit: contain; border-radius: 4px;
}
.quote-footer-bar {
  background: #f1f5f9; padding: 10px 32px; box-sizing: border-box; margin-top: auto;
  font-size: 10px; color: #475569; line-height: 1.6;
  border-top: 2px solid #1a2535;
}
.quote-footer-bar strong { color: #1a2535; }
.quote-actions {
  padding: 10px 32px; display: flex; gap: 12px;
  border-top: 1px solid #e2e8f0; background: white;
}
.qty-picker {
  display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px;
}
.qty-pill-q {
  padding: 3px 9px; border: 1.5px solid #dde3ec;
  border-radius: 20px; font-size: 10px; cursor: pointer;
  transition: all .15s; background: #f4f6f9; color: #1a2535;
  user-select: none;
}
.qty-pill-q.sel { background: #1a2535; border-color: #1a2535; color: white; }
.qty-pill-q:hover:not(.sel) { border-color: #1d6fb8; color: #1d6fb8; }
.editable-cell {
  border: 1px dashed #cbd5e1; border-radius: 4px;
  padding: 3px 6px; min-width: 60px; outline: none;
  font-family: 'Inter', sans-serif; font-size: 11px;
}
.editable-cell:focus { border-color: #1d6fb8; background: #eff6ff; }




@media print {
  @page {
    size: A4 landscape;
    margin: 8mm 10mm;
  }

  /* Hide UI elements */
  .quote-actions, .qty-picker, #quote-modal .quote-actions { display: none !important; }

  /* Show only the modal */
  body > *:not(#quote-modal) { display: none !important; }
  #quote-modal {
    position: static !important; background: none !important;
    padding: 0 !important; display: block !important;
  }
  .quote-modal-inner { box-shadow: none !important; border-radius: 0 !important; }

  /* Force colors */
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }

  .quote-header-bar { background: #000000 !important; color: white !important; }
  .quote-items-table th { background: #1a2535 !important; color: white !important; }
  .quote-items-table .price-cell { background: none !important; }
  .quote-footer-bar { background: #f1f5f9 !important; }
  .quote-meta { background: #f8fafc !important; }

  /* Compact fonts for print */
  .quote-items-table { font-size: 8px !important; border-collapse: collapse !important; }
  .quote-items-table th { font-size: 7px !important; padding: 5px 5px !important; border: 1px solid rgba(255,255,255,0.4) !important; }
  .quote-items-table td { font-size: 8px !important; padding: 4px 5px !important; border: 1px solid #999 !important; }
  .qt-thumb { width: 36px !important; height: 36px !important; }
  .quote-meta-field input, .quote-meta-field select { font-size: 10px !important; padding: 2px 6px !important; }

  /* No page break inside rows */
  .quote-items-table tr { page-break-inside: avoid !important; break-inside: avoid !important; }

  /* Footer repeats on every page */
  .quote-footer-bar {
    position: running(footer);
    display: block !important;
  }

  /* Editable cells — hide border on print */
  .editable-cell { border: none !important; background: none !important; }
  input, select { border: none !important; box-shadow: none !important; background: none !important; }
}

#float-scroll {
  position: fixed;
  bottom: 0;
  left: var(--sidebar);
  right: 0;
  height: 14px;
  background: #e8edf3;
  border-top: 1px solid var(--border);
  overflow-x: scroll;
  overflow-y: hidden;
  z-index: 50;
  cursor: pointer;
}
#float-scroll-inner {
  height: 1px;
}
#float-scroll::-webkit-scrollbar { height: 10px; }
#float-scroll::-webkit-scrollbar-track { background: #e8edf3; }
#float-scroll::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 10px; border: 2px solid #e8edf3; }
#float-scroll::-webkit-scrollbar-thumb:hover { background: var(--navy); }

.summary-bar {
  display: flex; flex-wrap: wrap; gap: 10px;
  margin-bottom: 14px; padding: 14px 16px;
  background: var(--white); border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: 0 2px 8px rgba(0,0,0,.04);
}
.summary-bar.hidden { display: none; }
.summary-card {
  display: flex; flex-direction: column;
  min-width: 140px; flex: 1;
  background: var(--light); border-radius: 7px;
  padding: 10px 14px; border: 1px solid var(--border);
  position: relative; overflow: hidden;
}
.summary-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 4px; border-radius: 4px 0 0 4px;
}
.sc-STOPPER::before   { background: #2563eb; }
.sc-ETIQUETA::before  { background: #16a34a; }
.sc-MUSELET::before   { background: #d97706; }
.sc-ACCESSORY::before { background: #7c3aed; }
.sc-LOOP::before      { background: #d97706; }
.summary-card .sc-tipo {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--muted); margin-bottom: 4px;
}
.summary-card .sc-avg {
  font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700;
  color: var(--navy); line-height: 1;
}
.summary-card .sc-avg span { font-size: 12px; font-weight: 400; color: var(--muted); }
.summary-card .sc-detail {
  font-size: 10px; color: var(--muted); margin-top: 4px; line-height: 1.4;
}
.summary-card .sc-range {
  font-size: 11px; color: var(--blue); font-weight: 600; margin-top: 2px;
}

.sc-mats {
  margin-top: 8px;
  border-top: 1px solid var(--border);
  padding-top: 7px;
  display: flex; flex-direction: column; gap: 5px;
}
.sc-mat-row {
  display: grid;
  grid-template-columns: 1fr 60px 90px;
  align-items: center; gap: 6px;
}
.sc-mat-name {
  font-size: 10px; font-weight: 600; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sc-mat-n { color: var(--muted); font-weight: 400; }
.sc-mat-bar-wrap {
  height: 5px; background: var(--border); border-radius: 3px; overflow: hidden;
}
.sc-mat-bar {
  height: 100%; background: var(--blue); border-radius: 3px;
  transition: width .3s ease;
}
.sc-mat-prices {
  font-size: 11px; font-weight: 700; color: var(--navy); text-align: right;
  white-space: nowrap;
}
.sc-mat-range {
  font-size: 9px; font-weight: 400; color: var(--muted); display: block;
}
/* wider cards to fit material breakdown */
.summary-card { min-width: 200px; flex: 1 1 220px; max-width: 380px; }


.price-range-wrap {
  display: flex; gap: 8px; align-items: center;
}
.price-range-wrap input[type=number] {
  width: 50%; padding: 8px 10px;
  border: 1.5px solid var(--border); border-radius: var(--radius);
  font-family: 'Inter', sans-serif; font-size: 12.5px; color: var(--text);
  background: var(--light); outline: none;
  transition: border-color .2s, box-shadow .2s;
  -moz-appearance: textfield;
}
.price-range-wrap input[type=number]::-webkit-outer-spin-button,
.price-range-wrap input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
.price-range-wrap input[type=number]:focus {
  border-color: var(--blue); box-shadow: 0 0 0 3px rgba(29,111,184,.12); background: white;
}
.price-range-sep { font-size: 12px; color: var(--muted); font-weight: 500; flex-shrink: 0; }
.price-range-note {
  font-size: 10px; color: var(--muted); margin-top: 4px; font-style: italic;
}


td.img-cell { width: 60px; padding: 4px 8px; text-align: center; vertical-align: middle; }
.prod-thumb {
  width: 52px; height: 52px; object-fit: contain;
  border-radius: 6px; border: 1px solid var(--border);
  background: white; cursor: pointer;
  transition: transform .2s, box-shadow .2s;
}
.prod-thumb:hover { transform: scale(1.08); box-shadow: 0 4px 12px rgba(0,0,0,.15); }
.no-img { width: 52px; height: 52px; background: var(--light);
  border-radius: 6px; border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: var(--border); }
/* Lightbox */
.lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75);
  z-index:1000; align-items:center; justify-content:center; cursor:pointer; }
.lightbox.open { display:flex; }
.lightbox img { max-width:80vw; max-height:80vh; object-fit:contain;
  border-radius:12px; box-shadow:0 8px 40px rgba(0,0,0,.4); }

.summary-empty {
  font-size: 12px; color: var(--muted); padding: 8px 4px;
  font-style: italic;
}

.lang-toggle {
  display:flex; align-items:center; gap:4px;
  background:rgba(255,255,255,.1); border-radius:20px;
  padding:3px; margin-left:16px;
}
.lang-btn {
  padding:3px 12px; border-radius:16px; font-size:11px;
  font-weight:700; cursor:pointer; border:none;
  transition:all .2s; letter-spacing:.5px;
  background:transparent; color:rgba(255,255,255,.6);
}
.lang-btn.active { background:var(--accent); color:var(--navy); }
.logo-img { height:32px; width:auto; }
.logo-placeholder {
  width:34px; height:34px; background:var(--accent); border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  font-family:'Syne',sans-serif; color:var(--navy);
  font-size:17px; font-weight:800; flex-shrink:0;
}

/* ── Proforma styles ── */
.pi-editable {
  display:inline-block; min-width:40px;
  border-bottom:1px dashed #aaa; outline:none;
  font-size:10px; padding:1px 2px;
}
.pi-editable:focus { border-bottom-color:var(--blue); background:#f0f7ff; }
.pi-it { text-align:center; font-size:9px; color:#555; }
.pi-img { width:44px; text-align:center; }
.pi-img img { width:38px; height:38px; object-fit:contain; border-radius:3px; }
.pi-qty { text-align:center; }

let ITEMS = DATA.items.slice(); // start with the 110 hardcoded items
let ALL_QTYS = DATA.qtys.slice();

function loadNewItems() {
  return new Promise((resolve) => {
    const cbName = '__apholos_cb_' + Date.now();
    window[cbName] = function(json) {
      var newItems = json.items || [];
      if (newItems.length > 0) {
        // Ensure every item has required fields
        newItems.forEach(function(item) {
          if (!item.prices || typeof item.prices !== 'object') item.prices = {};
          if (!item.tipo) item.tipo = 'STOPPER';
          if (!item.material) item.material = '—';
          // Normalize Zamac variants
          var zamacVariants = ['Zamac','ZAMAC','zamac','Zinc Alloy','Zinc die cast','Zinc alloy','ZINC ALLOY','Zamac / metal'];
          if (zamacVariants.indexOf(item.material) >= 0) item.material = 'Zamac / Metal';
          if (!item.medida) item.medida = '—';
          if (!item.cliente) item.cliente = '—';
          if (!item.leadtime) item.leadtime = '—';
          if (!item.fecha) item.fecha = '—';
          if (!item.origen) item.origen = '—';
          if (!item.cork) item.cork = '—';
          if (!item.color) item.color = '—';
          if (!item.agente) item.agente = '—';
          if (!item.img) item.img = '';
          // base64: use directly. Legacy fileId: try proxy
          if (item.img && !item.img.startsWith('http') && !item.img.startsWith('data:')) {
            resolveImg(item.img, function(dataUrl, itm) {
              itm.img = dataUrl;
              document.querySelectorAll('img.prod-thumb[data-fileid="' + itm.img + '"]').forEach(function(el) {
                el.src = dataUrl;
              });
            }, item);
          }
        });
        ITEMS = ITEMS.concat(newItems);
        // Merge new qtys
        var qtySet = new Set(ALL_QTYS);
        newItems.forEach(function(item) {
          if (item.prices) Object.keys(item.prices).forEach(function(q) { qtySet.add(Number(q)); });
        });
        ALL_QTYS = Array.from(qtySet).sort(function(a, b) { return a - b; });
        // Rebuild qty pills to include new quantities
        var pillsContainer = document.getElementById('qty-pills');
        pillsContainer.innerHTML = ALL_QTYS.map(function(q) {
          return '<div class="qty-pill active" data-qty="' + q + '" onclick="toggleQty(this)">' + qtyLabel(q) + '</div>';
        }).join('');
      }
      delete window[cbName];
      script.remove();
      resolve();
    };
    var script = document.createElement('script');
    script.src = SHEETS_URL + '?callback=' + cbName;
    script.onerror = function() {
      // If Sheet fails, just use the hardcoded items — no problem
      delete window[cbName];
      resolve();
    };
    document.head.appendChild(script);
  });
}
// Fetch a Google Drive image via Apps Script proxy and return as data URL
function resolveImg(fileId, callback, context) {
  var cbName = '__img_' + Date.now() + '_' + Math.floor(Math.random()*10000);
  var script;
  window[cbName] = function(resp) {
    delete window[cbName];
    if (script) script.remove();
    if (resp && resp.dataUrl) {
      callback(resp.dataUrl, context);
      // Actualizar imágenes en el DOM que tengan este fileId
      document.querySelectorAll('img.prod-thumb[data-fileid]').forEach(function(imgEl) {
        if (imgEl.getAttribute('data-fileid') === fileId) {
          imgEl.src = resp.dataUrl;
        }
      });
    }
  };
  script = document.createElement('script');
  script.onerror = function() { delete window[cbName]; if (script) script.remove(); };
  script.src = SHEETS_URL + '?action=img&id=' + encodeURIComponent(fileId) + '&callback=' + cbName;
  document.head.appendChild(script);
}

// Simple helper: get array of checked values from a container
function getChecked(containerId) {
  return Array.from(
    document.querySelectorAll('#' + containerId + ' input[type="checkbox"]:checked')
  ).map(function(el) { return el.value; });
}

// Update sel-count badge independently — does NOT call applyFilters
function refreshBadge(containerId, badgeId) {
  var n = getChecked(containerId).length;
  var total = document.querySelectorAll('#' + containerId + ' input[type="checkbox"]').length;
  document.getElementById(badgeId).textContent = (n > 0 && n < total) ? '(' + n + ' sel.)' : '';
}

function corkClass(c) {
  if (!c || c === '—') return '';
  var cl = c.toLowerCase();
  if (cl.indexOf('synthetic') >= 0) return 'ck-syn';
  if (cl.indexOf('micro')     >= 0) return 'ck-mic';
  if (cl.indexOf('natural')   >= 0) return 'ck-nat';
  if (cl.indexOf('gpi')       >= 0) return 'ck-gpi';
  return '';
}
function origClass(o) {
  if (!o) return '';
  if (o.toUpperCase().indexOf('DONGGUAN') >= 0) return 'o-dong';
  if (o.toUpperCase().indexOf('BUENOS')   >= 0) return 'o-bsas';
  return '';
}
function agClass(a) {
  if (!a) return '';
  if (a.indexOf('Mino')       >= 0) return 'ag-mino';
  if (a.indexOf('Luciana')    >= 0) return 'ag-luc';
  if (a.indexOf('Stefano')    >= 0) return 'ag-stef';
  if (a.indexOf('Enoservin')  >= 0) return 'ag-eno';
  if (a.indexOf('Accent')     >= 0) return 'ag-acc';
  return '';
}
function tipoClass(t) { if(!t) return 'b-STOPPER'; return t === 'LOOP COVER' ? 'b-LOOP' : 'b-' + t; }
function rowClass(t)  { if(!t) return 'rt-STOPPER'; return t === 'LOOP COVER' ? 'rt-LOOP' : 'rt-' + t; }
function qtyLabel(q)  { return q >= 1000 ? (q / 1000) + 'K' : String(q); }

function toggleQty(el) {

function toggleAllQtys() {
  var pills = document.querySelectorAll('#qty-pills .qty-pill');

  var med      = document.getElementById('f-med').value;
  var origen   = document.getElementById('f-origen').value;
  var selMats  = getChecked('mat-list');
  var selCork  = getChecked('cork-list');
  var selAg    = getChecked('ag-list');
  var selQtys = Array.from(
    document.querySelectorAll('#qty-pills .qty-pill.active')
  ).map(function(el) { return Number(el.getAttribute('data-qty')); });

  var filtered = ITEMS.filter(function(item) {
    // TIPO — single select, must match exactly if set
    if (tipo && item.tipo !== tipo) return false;

    // MEDIDA — single select
    if (med && item.medida !== med) return false;

    // ORIGEN — single select
    if (origen && item.origen !== origen) return false;

    // MATERIAL — multi checkbox: if any checked, item must match one of them (OR)
    if (selMats.length > 0) {
      var matchMat = false;
      for (var i = 0; i < selMats.length; i++) {
        if (item.material === selMats[i]) { matchMat = true; break; }
      }
      if (!matchMat) return false;
    }

    // CORK — multi checkbox: if any checked, item must match one of them (OR)
    if (selCork.length > 0) {
      var matchCork = false;
      for (var i = 0; i < selCork.length; i++) {
        if (item.cork === selCork[i]) { matchCork = true; break; }
      }
      if (!matchCork) return false;
    }

    // AGENTE — multi checkbox: OR
    if (selAg.length > 0) {
      var matchAg = false;
      for (var i = 0; i < selAg.length; i++) {
        if (item.agente === selAg[i]) { matchAg = true; break; }
      }
      if (!matchAg) return false;
    }

    // FREE TEXT
    if (search) {
      var hay = [item.desc, item.material, item.mat_raw, item.medida,
                 item.cliente, item.color, item.cork, item.codigo, item.agente].join(' ').toLowerCase();
      if (hay.indexOf(search) < 0) return false;
    }

    // PRICE RANGE — check if item has at least one price within range
    // across the currently selected qty columns
    var priceMin = parseFloat(document.getElementById('f-price-min').value);
    var priceMax = parseFloat(document.getElementById('f-price-max').value);
    var hasMin = !isNaN(priceMin) && priceMin >= 0;
    var hasMax = !isNaN(priceMax) && priceMax >= 0;
    if (hasMin || hasMax) {
      var itemPrices = selQtys.map(function(q) {
        return item.prices[String(q)];
      }).filter(function(p) { return p != null; });
      if (itemPrices.length === 0) return false;
      // item passes if ANY of its active-qty prices falls within the range
      var inRange = itemPrices.some(function(p) {
        var aboveMin = !hasMin || p >= priceMin;
        var belowMax = !hasMax || p <= priceMax;
        return aboveMin && belowMax;
      });
      if (!inRange) return false;
    }

    return true;
  });

  // Only show qty columns that have prices in the filtered set AND are selected
  var qtysWithData = selQtys.filter(function(q) {
    return filtered.some(function(item) {
      var p = parseFloat(item.prices[String(q)]);
      return !isNaN(p) && p > 0;
    });
  });

  var n = filtered.length;
  document.getElementById('hcount').textContent = n;
  document.getElementById('rcount').textContent = n;

  renderTable(filtered, qtysWithData);
  updateSummary(filtered, qtysWithData);
}

// ── Summary bar ───────────────────────────────────────────────────────
function updateSummary(filteredRows, activeQtys) {
  var bar = document.getElementById('summary-bar');
  if (!filteredRows.length || !activeQtys.length) {
    bar.classList.add('hidden');
    return;
  }

  // Group by tipo → material
  var groups = {};
  filteredRows.forEach(function(item) {
    var tipo = item.tipo;
    var mat  = item.material || '—';
    if (!groups[tipo]) groups[tipo] = { total: [], byMat: {} };
    if (!groups[tipo].byMat[mat]) groups[tipo].byMat[mat] = [];

    activeQtys.forEach(function(q) {
      var p = parseFloat(item.prices[String(q)]);
      if (!isNaN(p) && p > 0) {
        groups[tipo].total.push(p);
        groups[tipo].byMat[mat].push(p);
      }
    });
  });

  var tipoOrder = ['STOPPER','ETIQUETA','MUSELET','LOOP COVER','ACCESSORY'];
  var cards = '';

  tipoOrder.forEach(function(tipo) {
    var g = groups[tipo];
    if (!g || !g.total.length) return;

    var avg  = g.total.reduce(function(a,b){return a+b;},0) / g.total.length;
    var minP = Math.min.apply(null, g.total);
    var maxP = Math.max.apply(null, g.total);
    var nItems = filteredRows.filter(function(r){ return r.tipo === tipo; }).length;
    var label  = tipLabel(tipo);
    var scClass = tipo === 'LOOP COVER' ? 'sc-LOOP' : 'sc-' + tipo;

    // Build material breakdown rows — sorted by avg price desc
    var matRows = Object.keys(g.byMat).map(function(mat) {
      var prices = g.byMat[mat];
      var mAvg = prices.reduce(function(a,b){return a+b;},0) / prices.length;
      var mMin = Math.min.apply(null, prices);
      var mMax = Math.max.apply(null, prices);
      var mCount = filteredRows.filter(function(r){ return r.tipo===tipo && r.material===mat; }).length;
      return { mat: mat, avg: mAvg, min: mMin, max: mMax, count: mCount };
    }).sort(function(a,b){ return b.avg - a.avg; });

    var matHtml = matRows.map(function(m) {
      var bar_pct = maxP > 0 ? Math.round((m.avg / maxP) * 100) : 0;
      return '<div class="sc-mat-row">' +
        '<div class="sc-mat-name">' + m.mat + ' <span class="sc-mat-n">(' + m.count + ')</span></div>' +
        '<div class="sc-mat-bar-wrap"><div class="sc-mat-bar" style="width:' + bar_pct + '%"></div></div>' +
        '<div class="sc-mat-prices">$' + m.avg.toFixed(3) +
          ' <span class="sc-mat-range">$' + m.min.toFixed(3) + '–$' + m.max.toFixed(3) + '</span>' +
        '</div>' +
      '</div>';
    }).join('');

    cards += '<div class="summary-card ' + scClass + '">' +
      '<div class="sc-tipo">' + label + ' &nbsp;·&nbsp; ' + nItems + ' ' + t('avg_items') + '</div>' +
      '<div class="sc-avg">$' + avg.toFixed(3) + ' <span>USD avg.</span></div>' +
      '<div class="sc-range">' + t('avg_range') + ': $' + minP.toFixed(3) + ' — $' + maxP.toFixed(3) + '</div>' +
      '<div class="sc-mats">' + matHtml + '</div>' +
    '</div>';
  });

  if (!cards) { bar.classList.add('hidden'); return; }
  bar.classList.remove('hidden');
  bar.innerHTML = cards;
}

function toggleSelect(cb) {
  var key = parseInt(cb.getAttribute('data-key'));
  if (cb.checked) {
    selectedItems[key] = ITEMS[key];
  } else {
    delete selectedItems[key];
  }
  updateQuoteBar();
}

function updateQuoteBar() {
  var n = Object.keys(selectedItems).length;
  var bar = document.getElementById('quote-bar');
  document.getElementById('sel-count').textContent = n;
  bar.classList.toggle('visible', n > 0);

  var items = Object.values(selectedItems).filter(function(i){ return i != null; });

  // ARG: origen contains BUENOS or ARGENTINA or AR
  var hasArg = items.some(function(i){
    if (!i.origen) return false;
    var o = i.origen.toUpperCase();
    return o.indexOf('BUENOS') >= 0 || o.indexOf('ARGENTINA') >= 0 || o === 'AR';
  });

  // ASIA: origen contains DONGGUAN, CHINA, HONG KONG, HK, or ASIA
  var hasAsia = items.some(function(i){
    if (!i.origen) return false;
    var o = i.origen.toUpperCase();
    return o.indexOf('DONGGUAN') >= 0 || o.indexOf('CHINA') >= 0 ||
           o.indexOf('HONG KONG') >= 0 || o.indexOf('ASIA') >= 0 || o === 'HK';
  });

  // Dropdown selector handles entity choice
}

function deleteQuoteRow(btn) {
  var tr = btn.closest('tr');
  if (tr) tr.remove();
}

function duplicateQuoteRow(btn) {
  var tr = btn.closest('tr');
  if (!tr) return;
  var clone = tr.cloneNode(true);
  var tbody = document.getElementById('quote-tbody');
  var allRows = tbody.querySelectorAll('tr[data-item-row]');
  var newIdx = allRows.length;
  clone.setAttribute('data-item-row', newIdx);
  clone.removeAttribute('id');
  var priceDiv = clone.querySelector('[id^="prices-"]');
  if (priceDiv) priceDiv.id = 'prices-' + newIdx;
  clone.querySelectorAll('[data-item]').forEach(function(el){ el.setAttribute('data-item', newIdx); });
  tr.parentNode.insertBefore(clone, tr.nextSibling);
}

function openProformaFromDropdown() {
  var sel = document.getElementById('pi-entity-sel');
  if (!sel || !sel.value) {
    alert('Por favor seleccioná una entidad (ARG o ASIA) antes de abrir la proforma.');
    sel && sel.focus();
    return;
  }
  openProformaModal(sel.value);
}

function updatePrices(i, item) {
  var container = document.getElementById('prices-' + i);
  if (!container) return;
  var pills = document.querySelectorAll('[data-item="' + i + '"].sel');

  // Preserve existing shipping values before rebuilding
  var savedShipping = {};
  container.querySelectorAll('.ship-row').forEach(function(row) {
    var q = row.dataset.qty;
    savedShipping[q] = {
      inco:  row.querySelector('.ship-inco')  ? row.querySelector('.ship-inco').value  : '',
      cost:  row.querySelector('.ship-cost')  ? row.querySelector('.ship-cost').value  : ''
    };
  });

  var rows = [];
  pills.forEach(function(p) {
    var q = parseInt(p.getAttribute('data-qty'));
    var price = item.prices[String(q)];
    if (price != null) {
      var saved = savedShipping[String(q)] || {};
      var incoOpts = ['','AIR DAP','AIR DDP','AIR CIF','AIR FCA','SEA DAP','SEA DDP','SEA CIF','SEA CFR','SEA FCA','EXW'].map(function(o) {
        return '<option value="'+o+'"'+(saved.inco===o?' selected':'')+'>'+( o||'— incoterm —')+'</option>';
      }).join('');
      rows.push(
        '<div style="padding:2px 0;border-bottom:1px solid #e2e8f0;white-space:nowrap">' +
          '<span style="color:#64748b;font-size:10px;margin-right:8px">' + qtyLabel(q) + ' u.</span>' +
          '<span style="font-weight:600;color:#1a2535;font-size:9px">USD ' + parseFloat(price).toFixed(2) + '</span>' +
        '</div>' +
        '<div class="ship-row no-print-hide" data-qty="'+q+'" style="display:flex;align-items:center;gap:4px;padding:2px 0 4px 0;border-bottom:1px dashed #e2e8f0">' +
          '<span style="font-size:9px;color:#94a3b8;white-space:nowrap">🚢 ship:</span>' +
          '<select class="ship-inco" style="font-size:9px;border:1px solid #ddd;border-radius:3px;padding:1px 2px;color:#334155;background:#f8fafc">'+incoOpts+'</select>' +
          '<span style="font-size:9px;color:#94a3b8">USD</span>' +
          '<input type="text" class="ship-cost" placeholder="0.00" value="'+(saved.cost||'')+'" style="width:52px;font-size:9px;border:1px solid #ddd;border-radius:3px;padding:1px 4px;outline:none;text-align:right">' +
        '</div>'
      );
    }
  });
  container.innerHTML = rows.join('');
}

function toggleQtyPill(pill) {
  pill.classList.toggle('sel');
  var i    = parseInt(pill.getAttribute('data-item'));
  var item = Object.values(selectedItems).filter(function(x){ return x != null; })[i];
  if (item) updatePrices(i, item);
}

function prepareAndPrint() {
  // Before printing, build clean print pages with header+footer on each page
  var items = Object.values(selectedItems).filter(function(i){ return i!=null; });
  var agent     = document.getElementById('q-agent').value;
  var agentInfo = AGENTS[agent] || {};
  var client    = document.getElementById('q-client').value;
  var date      = document.getElementById('q-date').value;
  var incoterm  = document.getElementById('q-incoterm').value;
  var origin    = document.getElementById('q-origin').value;

  // Get all editable values from current form
  var rows = document.querySelectorAll('#quote-tbody tr[data-item-row]');
  var rowData = [];
  rows.forEach(function(tr) {
    var cells = tr.querySelectorAll('td');
    var prices = tr.querySelector('.selected-prices');
    // Collect price rows and shipping info separately for clean print
    var priceLines = [];
    if (prices) {
      prices.querySelectorAll('.ship-row').forEach(function(shipRow) {
        var inco = shipRow.querySelector('.ship-inco') ? shipRow.querySelector('.ship-inco').value : '';
        var cost = shipRow.querySelector('.ship-cost') ? shipRow.querySelector('.ship-cost').value.trim() : '';
        if (inco || cost) {
          priceLines.push({ qty: shipRow.dataset.qty, inco: inco, cost: cost });
        }
      });
    }
    rowData.push({
      img:      tr.querySelector('img') ? tr.querySelector('img').src : '',
      tipo:     cells[1] ? cells[1].textContent.trim() : '',
      desc:     cells[2] ? cells[2].innerHTML : '',
      material: cells[3] ? (cells[3].querySelector('.editable-cell') ? cells[3].querySelector('.editable-cell').textContent : cells[3].textContent) : '',
      ncm:      cells[4] ? cells[4].querySelector('.editable-cell').textContent : '',
      color:    cells[5] ? (cells[5].querySelector('.editable-cell') ? cells[5].querySelector('.editable-cell').textContent : cells[5].textContent) : '',
      design:   cells[6] ? cells[6].querySelector('.editable-cell').textContent : '',
      origen:   cells[7] ? (cells[7].querySelector('.editable-cell') ? cells[7].querySelector('.editable-cell').textContent : cells[7].textContent) : '',
      cork:     cells[8] ? (cells[8].querySelector('.editable-cell') ? cells[8].querySelector('.editable-cell').textContent : cells[8].textContent) : '',
      pricesHtml: prices ? (function(p){
        // Strip shipping rows from print HTML
        var clone = p.cloneNode(true);
        clone.querySelectorAll('.ship-row, .no-print-hide').forEach(function(el){ el.remove(); });
        return clone.innerHTML;
      })(prices) : '',
      shipping: priceLines,
      proto3d:  cells[10] ? cells[10].querySelector('.editable-cell').textContent : '',
      mold:     cells[11] ? cells[11].querySelector('.editable-cell').textContent : '',
      medida:   cells[12] ? (cells[12].querySelector('.editable-cell') ? cells[12].querySelector('.editable-cell').textContent : cells[12].textContent) : '',
      leadtime: cells[13] ? (cells[13].querySelector('.editable-cell') ? cells[13].querySelector('.editable-cell').textContent : cells[13].textContent) : '',
      obs:      cells[14] ? cells[14].querySelector('.editable-cell').textContent : '',
    });
  });

  // Check if any row has shipping data
  var hasShipping = rowData.some(function(r){ return r.shipping && r.shipping.length > 0; });

  // Build print window content
  var printRows = function(pageItems) {
    return pageItems.map(function(r) {
      // Build price lines: each qty+price on one line
      var priceLinesHtml = '';
      if (r.pricesHtml) {
        // Parse the existing price divs and reformat as single lines
        var tmp = document.createElement('div');
        tmp.innerHTML = r.pricesHtml;
        tmp.querySelectorAll('div').forEach(function(d){
          priceLinesHtml += '<div style="white-space:nowrap;padding:1px 0;border-bottom:1px solid #e2e8f0">' + d.innerHTML + '</div>';
        });
        if (!priceLinesHtml) priceLinesHtml = r.pricesHtml;
      }

      // Build shipping lines aligned to price rows
      var shippingHtml = '';
      if (hasShipping && r.shipping && r.shipping.length) {
        // Pad to match number of price rows
        var priceCount = (r.pricesHtml.match(/<div/g)||[]).length || r.shipping.length;
        var padded = [];
        for (var si = 0; si < priceCount; si++) padded.push('<div style="padding:1px 0;border-bottom:1px solid #e2e8f0;white-space:nowrap;min-height:16px">' + (r.shipping[si] ? '<span style="font-size:8px;color:#475569">' + r.shipping[si].inco + (r.shipping[si].cost ? ' <strong>USD '+r.shipping[si].cost+'</strong>' : '') + '</span>' : '') + '</div>');
        shippingHtml = padded.join('');
      } else if (hasShipping) {
        shippingHtml = '—';
      }

      return '<tr style="page-break-inside:avoid;break-inside:avoid">' +
        '<td style="width:80px;text-align:center">' + (r.img ? '<img src="'+r.img+'" style="width:72px;height:72px;object-fit:contain">' : '') + '</td>' +
        '<td style="white-space:nowrap;font-size:7px;font-weight:600">' + (r.tipo||'—') + '</td>' +
        '<td style="max-width:140px;word-break:break-word">' + r.desc + '</td>' +
        '<td>' + r.material + '</td>' +
        '<td>' + (r.ncm||'—') + '</td>' +
        '<td>' + r.color + '</td>' +
        '<td>' + (r.design||'—') + '</td>' +
        '<td>' + r.origen + '</td>' +
        '<td>' + r.cork + '</td>' +
        '<td style="white-space:nowrap">' + priceLinesHtml + '</td>' +
        (hasShipping ? '<td style="white-space:nowrap">' + shippingHtml + '</td>' : '') +
        '<td>' + (r.proto3d||'—') + '</td>' +
        '<td>' + (r.mold||'—') + '</td>' +
        '<td>' + r.medida + '</td>' +
        '<td>' + r.leadtime + '</td>' +
        '<td style="max-width:70px;width:70px;white-space:normal;word-break:break-word;line-height:1.4">' + (r.obs||'') + '</td>' +
      '</tr>';
    }).join('');
  };

  var PAGE_SIZE = 5;
  var pages = [];
  for (var p = 0; p < rowData.length; p += PAGE_SIZE) {
    pages.push(rowData.slice(p, p + PAGE_SIZE));
  }

// Update hidden shipterm field when dropdowns change
function piUpdateShipterm() {
  var rule    = document.getElementById('pi-incoterm-rule');
  var place   = document.getElementById('pi-incoterm-place');
  var custom  = document.getElementById('pi-incoterm-custom');
  var hidden  = document.getElementById('pi-shipterm');
  if (!rule || !place) return;
  var placeVal = place.value === 'other' ? (custom ? custom.value : '') : place.value;
  if (custom) custom.style.display = place.value === 'other' ? 'block' : 'none';
  if (hidden) hidden.value = rule.value + (placeVal ? ' ' + placeVal : '');
}

function piUpdateTerms() {
  var sel    = document.getElementById('pi-terms-sel');
  var custom = document.getElementById('pi-terms-custom');
  var hidden = document.getElementById('pi-terms');
  if (!sel) return;
  if (custom) custom.style.display = sel.value === 'other' ? 'block' : 'none';
  if (hidden) hidden.value = sel.value === 'other' ? (custom ? custom.value : '') : sel.value;
  // keep custom in sync while typing
  if (sel.value === 'other' && custom) {
    custom.oninput = function() { if (hidden) hidden.value = custom.value; };
  }
}

// Add a manual extra line item row into the main items table
var piManualRowCount = 0;
function piAddManualRow() {
  var tbody = document.getElementById('pi-tbody');
  if (!tbody) return;
  var idx = 'manual-' + (++piManualRowCount);
  // Calculate next sequential item number
  var existingRows = tbody.querySelectorAll('tr.pi-item-row, tr.pi-manual-row');
  var nextNum = existingRows.length + 1;
  var numStr = nextNum < 10 ? '0' + nextNum : '' + nextNum;
  var tr = document.createElement('tr');
  tr.className = 'pi-manual-row';
  tr.dataset.idx = idx;
  tr.innerHTML =
    '<td class="pi-it" style="border:1px solid #ccc;padding:3px 5px;text-align:center;font-size:10px;font-family:Inter,sans-serif">'+numStr+'</td>' +
    '<td class="pi-img" style="border:1px solid #ccc;padding:2px 4px;text-align:center;width:44px"></td>' +
    '<td style="border:1px solid #ccc;padding:3px 5px;text-align:center">' +
      '<input type="text" class="pi-manual-qty" data-idx="'+idx+'" placeholder="1" oninput="piRecalcManualRow(\''+idx+'\')" style="width:55px;border:1px solid #ddd;border-radius:3px;font-size:10px;font-family:Inter,sans-serif;padding:1px 4px;outline:none;text-align:center">' +
    '</td>' +
    '<td class="pi-desc" style="border:1px solid #ccc;padding:3px 5px">' +
      '<input type="text" class="pi-manual-desc" data-idx="'+idx+'" placeholder="Shipping / Mold Setup / Jig Device..." style="width:100%;border:none;border-bottom:1px dashed #bbb;font-size:10px;font-family:Inter,sans-serif;padding:1px 2px;outline:none">' +
    '</td>' +
    '<td style="border:1px solid #ccc;padding:3px 5px;text-align:right">' +
      '<input type="text" class="pi-manual-price" data-idx="'+idx+'" placeholder="0.00" oninput="piRecalcManualRow(\''+idx+'\')" style="width:65px;border:1px solid #ddd;border-radius:3px;font-size:10px;font-family:Inter,sans-serif;padding:1px 4px;outline:none;text-align:right">' +
    '</td>' +
    '<td class="pi-manual-total pi-total" data-idx="'+idx+'" style="border:1px solid #ccc;padding:3px 5px;text-align:right;font-size:10px;font-family:Inter,sans-serif;font-weight:600">$0.00</td>';
  // append remove button (hidden in print)
  var tdDel = document.createElement('td');
  tdDel.style.cssText = 'border:none;padding:2px 4px;position:relative;';
  tdDel.className = 'no-print-hide';
  tdDel.innerHTML = '<span class="pi-row-actions" style="display:flex;gap:3px;">' +
    '<button class="pi-row-btn dup" onclick="piDupRow(this)" title="Duplicar">⊕</button>' +
    '<button class="pi-row-btn del" onclick="piDelRow(this)" title="Eliminar">✕</button>' +
    '</span>';
  tr.appendChild(tdDel);
  tbody.appendChild(tr);
}

function piDupRow(btn) {
  var tr = btn.closest('tr');
  if (!tr) return;
  var clone = tr.cloneNode(true);
  clone.querySelectorAll('input').forEach(function(inp) { inp.value = inp.value; });
  tr.parentNode.insertBefore(clone, tr.nextSibling);
  // Renumber all rows sequentially
  piRenumberRows();
  piRecalcSubtotal();
}

function piDelRow(btn) {
  var tr = btn.closest('tr');
  if (tr) { tr.remove(); piRenumberRows(); piRecalcSubtotal(); }
}

function piRenumberRows() {
  var tbody = document.getElementById('pi-tbody');
  if (!tbody) return;
  var rows = tbody.querySelectorAll('tr.pi-item-row, tr.pi-manual-row');
  rows.forEach(function(tr, idx) {
    var numStr = (idx + 1) < 10 ? '0' + (idx + 1) : '' + (idx + 1);
    var itCell = tr.querySelector('.pi-it');
    if (itCell) {
      // Keep buttons, just update the text node
      var actions = itCell.querySelector('.pi-row-actions');
      itCell.textContent = numStr;
      if (actions) itCell.appendChild(actions);
    }
  });
}

function piRecalcManualRow(idx) {
  var qtyEl   = document.querySelector('.pi-manual-qty[data-idx="'+idx+'"]');
  var priceEl = document.querySelector('.pi-manual-price[data-idx="'+idx+'"]');
  var totEl   = document.querySelector('.pi-manual-total[data-idx="'+idx+'"]');
  if (!qtyEl || !priceEl || !totEl) return;
  // Allow negative values — strip everything except digits, dot, and leading minus
  var qty   = parseFloat(qtyEl.value.replace(/[^0-9.\-]/g,'')) || 0;
  var price = parseFloat(priceEl.value.replace(/[^0-9.\-]/g,'')) || 0;
  var tot   = (qty !== 0 && price !== 0) ? qty * price : price; // flat fee if no qty
  var prefix = tot < 0 ? '-$' : '$';
  totEl.textContent = prefix + Math.abs(tot).toFixed(2);
  piRecalcSubtotal();
}

function piClientSearch(val) {
  var dd = document.getElementById('pi-client-dropdown');
  if (!dd) return;
  var q = val.trim().toLowerCase();
  if (q.length < 2) { dd.style.display = 'none'; return; }
  var matches = FM_CLIENTS.filter(function(c) {
    return c.name.toLowerCase().indexOf(q) >= 0 || c.id.toLowerCase().indexOf(q) >= 0;
  }).slice(0, 20);
  if (!matches.length) { dd.style.display = 'none'; return; }
  dd.innerHTML = matches.map(function(c) {
    return '<div onclick="piClientSelect(\''+c.id.replace(/'/g,"\\'")+'\')" ' +
      'data-name="'+c.name.replace(/"/g,'&quot;')+'" ' +
      'data-addr="'+c.addr.replace(/"/g,'&quot;').replace(/\n/g,'&#10;')+'" ' +
      'data-country="'+c.country.replace(/"/g,'&quot;')+'" ' +
      'style="padding:6px 10px;cursor:pointer;border-bottom:1px solid #f1f5f9;line-height:1.4" ' +
      'onmouseover="this.style.background=\'#f0f7ff\'" onmouseout="this.style.background=\'\'">' +
      '<span style="font-weight:600;color:#1a3450">' + c.name + '</span>' +
      '<span style="color:#94a3b8;margin-left:8px;font-size:10px">' + c.id + '</span>' +
      '<span style="color:#94a3b8;margin-left:8px;font-size:10px">' + c.country + '</span>' +
    '</div>';
  }).join('');
  dd.style.display = 'block';
}

function piClientSelect(id) {
  var client = FM_CLIENTS.find(function(c){ return c.id === id; });
  if (!client) return;
  var searchEl = document.getElementById('pi-client-search');
  var custEl   = document.getElementById('pi-custid');
  var billToEl = document.getElementById('pi-billto');
  var dd       = document.getElementById('pi-client-dropdown');
  if (searchEl) searchEl.value = client.name;
  if (custEl)   custEl.value   = client.id;
  if (billToEl) {
    billToEl.value = client.name + '\n' + client.addr + (client.country ? '\n' + client.country : '');
    piSyncShipTo();
  }
  if (dd) dd.style.display = 'none';
}

// Close dropdown when clicking outside
document.addEventListener('click', function(e) {
  var dd = document.getElementById('pi-client-dropdown');
  if (dd && !dd.contains(e.target) && e.target.id !== 'pi-client-search') {
    dd.style.display = 'none';
  }
});

function piSyncShipTo() {
  var same = document.getElementById('pi-shipto-same');
  if (same && same.checked) {
    var shipTo = document.getElementById('pi-shipto');
    var billTo = document.getElementById('pi-billto');
    if (shipTo && billTo) shipTo.value = billTo.value;
  }
}
function piToggleShipTo() {
  var same   = document.getElementById('pi-shipto-same');
  var shipTo = document.getElementById('pi-shipto');
  var billTo = document.getElementById('pi-billto');
  if (!same || !shipTo || !billTo) return;
  if (same.checked) {
    shipTo.value = billTo.value;
    shipTo.disabled = true;
    shipTo.style.background = '#f8fafc';
  } else {
    shipTo.disabled = false;
    shipTo.style.background = '';
  }
}

// Recalculate when tier dropdown changes — updates price, keeps custom qty
function piRecalcRow(i) {
  var sel       = document.querySelector('.pi-qty-sel[data-item="'+i+'"]');
  var qtyInput  = document.querySelector('.pi-qty-input[data-item="'+i+'"]');
  var priceCell = document.querySelector('.pi-price-cell[data-item="'+i+'"]');
  var totalCell = document.getElementById('pi-total-'+i);
  if (!sel) return;
  var tierQty = parseInt(sel.value);
  var items = Object.values(selectedItems).filter(function(x){ return x != null; });
  var item = items[i];
  if (!item) return;
  var price = item.prices[String(tierQty)];
  var pNum = price ? parseFloat(price) : 0;
  // Use custom qty input if filled, otherwise fall back to tier qty
  var customQty = qtyInput ? (parseInt(qtyInput.value) || tierQty) : tierQty;
  if (qtyInput) qtyInput.value = customQty;
  if (priceCell) priceCell.textContent = '$'+pNum.toFixed(2);
  if (totalCell) totalCell.textContent = '$'+(customQty * pNum).toFixed(2);
  piRecalcSubtotal();
}

// Recalculate when custom qty input changes
function piRecalcRowFromQty(i) {
  var qtyInput  = document.querySelector('.pi-qty-input[data-item="'+i+'"]');
  var priceCell = document.querySelector('.pi-price-cell[data-item="'+i+'"]');
  var totalCell = document.getElementById('pi-total-'+i);
  if (!qtyInput || !priceCell || !totalCell) return;
  var qty   = parseInt(qtyInput.value) || 0;
  var pNum  = parseFloat(priceCell.textContent.replace(/[^0-9.]/g,'')) || 0;
  totalCell.textContent = '$'+(qty * pNum).toFixed(2);
  piRecalcSubtotal();
}

// Recalculate when price is manually edited
function piRecalcRowFromPrice(i) {
  var qtyInput  = document.querySelector('.pi-qty-input[data-item="'+i+'"]');
  var sel       = document.querySelector('.pi-qty-sel[data-item="'+i+'"]');
  var priceCell = document.querySelector('.pi-price-cell[data-item="'+i+'"]');
  var totalCell = document.getElementById('pi-total-'+i);
  if (!priceCell || !totalCell) return;
  var qty = qtyInput ? (parseInt(qtyInput.value) || 0) : (sel ? parseInt(sel.value) || 0 : 0);
  var pNum = parseFloat(priceCell.textContent.replace(/[^0-9.]/g,'')) || 0;
  totalCell.textContent = '$'+(qty * pNum).toFixed(2);
  piRecalcSubtotal();
}

function piRecalcAll(items) {
  items.forEach(function(item, i) { piRecalcRow(i); });
}

function piRecalcSubtotal() {
  var totals = document.querySelectorAll('#pi-tbody td.pi-total, #pi-tbody td.pi-manual-total');
  var sum = 0;
  totals.forEach(function(td){
    var txt = td.textContent.trim();
    var negative = txt.charAt(0) === '-';
    var v = parseFloat(txt.replace(/[^0-9.]/g,'')) || 0;
    sum += negative ? -v : v;
  });
  var prefix = sum < 0 ? '-u$s ' : 'u$s ';
  var fmt = prefix + Math.abs(sum).toFixed(2);
  var s = document.getElementById('pi-subtotal');
  var g = document.getElementById('pi-grand-total');
  if (s) s.textContent = fmt;
  if (g) g.textContent = fmt;
}

// Get next proforma number from Apps Script
// Apps Script needs: getProformaNumber(entity) → returns {number: "APH01302"}
// and logProforma(entity, number, client, agent, total) → logs to Proformas sheet
function piGetNextNumber(entity, callback) {
  var cbName = '__pi_num_' + Date.now();
  var script;
  window[cbName] = function(resp) {
    delete window[cbName];
    if (script) script.remove();
    if (resp && resp.number) callback(resp.number);
    else callback((entity === 'ARG' ? 'APH' : 'AS') + '00001');
  };
  script = document.createElement('script');
  script.onerror = function() {
    delete window[cbName];
    if (script) script.remove();
    callback((entity === 'ARG' ? 'APH' : 'AS') + '00001');
  };
  script.src = SHEETS_URL + '?action=getProformaNumber&entity=' + encodeURIComponent(entity) + '&callback=' + cbName;
  document.head.appendChild(script);
}

// Log proforma to Google Sheet
function piLogProforma(entity, number, client, agent, total, items) {
  var cbName = '__pi_log_' + Date.now();
  window[cbName] = function() { delete window[cbName]; if (script) script.remove(); };
  var script = document.createElement('script');
  script.onerror = function() { delete window[cbName]; };
  script.src = SHEETS_URL +
    '?action=logProforma' +
    '&entity='  + encodeURIComponent(entity) +
    '&number='  + encodeURIComponent(number) +
    '&client='  + encodeURIComponent(client) +
    '&agent='   + encodeURIComponent(agent) +
    '&total='   + encodeURIComponent(total) +
    '&items='   + encodeURIComponent(items||'') +
    '&callback='+ cbName;
  document.head.appendChild(script);
}

    '</tr></tbody>' +
  '</table>' +

  // Items table
  '<table style="width:100%;border-collapse:collapse;font-size:9px;margin-bottom:8px">' +
    '<thead><tr style="background:#1a3450;color:white;-webkit-print-color-adjust:exact;print-color-adjust:exact">' +
      '<th style="padding:4px 6px;border:1px solid #888;width:24px">It</th>' +
      '<th style="padding:4px 6px;border:1px solid #888;width:44px">Photo</th>' +
      '<th style="padding:4px 6px;border:1px solid #888;width:60px">Quantity</th>' +
      '<th style="padding:4px 6px;border:1px solid #888">D e s c r i p t i o n</th>' +
      '<th style="padding:4px 6px;border:1px solid #888;width:72px">Unit Price</th>' +
      '<th style="padding:4px 6px;border:1px solid #888;width:80px">Total</th>' +
    '</tr></thead>' +
    '<tbody>' + itemRowsHtml + emptyRowsHtml + '</tbody>' +
  '</table>' +

  // Observations — just below item lines, before T&C
  (piObs ? '<div style="margin-bottom:10px;padding:6px 8px;border:1px solid #ccc;font-size:9px;line-height:1.5"><strong>Observations:</strong><br>'+piObs.replace(/\n/g,'<br>')+'</div>' : '') +

  // T&C + Totals
  '<div style="display:flex;gap:10px;margin-bottom:10px">' +
    '<div style="flex:1;border:1px solid #ccc;padding:6px">' +
      (isArg ? '<strong style="font-size:8px">CONDITIONS OF SALE:</strong>' : '<strong style="font-size:8px">Term &amp; Conditions for custom-made products</strong>') +
      '<div style="margin-top:3px">'+tcHtml+'</div>' +
    '</div>' +
    '<div style="min-width:180px">' +
      '<table style="width:100%;border-collapse:collapse;font-size:9px">' +
        '<tr><td style="padding:3px 5px">Subtotal</td><td style="padding:3px 5px;text-align:right;font-weight:600">'+piSubtotal+'</td></tr>' +
        '<tr><td style="padding:3px 5px">Tax</td><td style="padding:3px 5px"></td></tr>' +
        '<tr><td style="padding:3px 5px">Shipping</td><td style="padding:3px 5px"></td></tr>' +
        (isArg ? '<tr><td style="padding:3px 5px">Credit Note</td><td style="padding:3px 5px"></td></tr>' : '') +
        '<tr style="font-weight:700;font-size:10px"><td style="padding:4px 5px;border-top:2px solid #000">TOTAL'+(isArg?' DUE':'')+'</td><td style="padding:4px 5px;text-align:right;border-top:2px solid #000">'+piTotal+'</td></tr>' +
      '</table>' +
    '</div>' +
  '</div>' +

  // Lead note (ARG only)
  (isArg ? '<p style="font-size:9px;margin-bottom:8px">*LEAD TIME displayed on this document starts once the order is confirmed.</p>' : '') +

  // Payment
  '<div style="font-size:9px;margin-bottom:8px;line-height:1.6">'+payHtml+'</div>' +

  // Footer obs (ARG only)
  (isArg ? '<p style="font-size:9px;font-weight:700;margin-bottom:8px">OBS: PRO-FORMA MUST BE DATED, SIGNED AND RETURNED TO US FOR ORDER PROCESSING.</p>' : '') +

  // Signature line (Asia only)
  (entity==='ASIA' ? '<div style="text-align:right;margin-top:16px"><div style="display:inline-block;border-top:1px solid #000;padding-top:4px;min-width:200px;font-size:9px">Customer\'s Authorized Signature</div></div>' : '') +

  '<script>window.onload=function(){window.print();}<\/script>' +
  '</body></html>';

  // Build items summary for log
  var itemDescriptions = [];
  document.querySelectorAll('#pi-tbody .pi-item-row').forEach(function(tr) {
    var desc  = tr.querySelector('.pi-editable') ? tr.querySelector('.pi-editable').textContent.trim() : '';
    var qtyIn = tr.querySelector('.pi-qty-input');
    var qtySel= tr.querySelector('.pi-qty-sel');
    var qty   = qtyIn ? qtyIn.value.trim() : (qtySel ? qtySel.value : '');
    if (desc) itemDescriptions.push(qty ? qty + ' x ' + desc : desc);
  });
  document.querySelectorAll('#pi-tbody .pi-manual-row').forEach(function(tr) {
    var desc = tr.querySelector('.pi-manual-desc') ? tr.querySelector('.pi-manual-desc').value.trim() : '';
    var qty  = tr.querySelector('.pi-manual-qty')  ? tr.querySelector('.pi-manual-qty').value.trim()  : '';
    if (desc) itemDescriptions.push(qty ? qty + ' x ' + desc : desc);
  });
  var piItemsSummary = itemDescriptions.join(' | ');

  // Show confirmation modal before printing and logging
  var confirmDiv = document.createElement('div');
  confirmDiv.id = 'pi-confirm-overlay';
  confirmDiv.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99999;display:flex;align-items:center;justify-content:center';
  confirmDiv.innerHTML =
    '<div style="background:white;border-radius:10px;padding:28px 32px;max-width:480px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.25)">' +
      '<div style="font-size:16px;font-weight:700;color:#1a3450;margin-bottom:6px">Confirmar Proforma</div>' +
      '<div style="font-size:12px;color:#64748b;margin-bottom:16px">Al confirmar, se generará el PDF y se registrará en el sistema.</div>' +
      '<table style="width:100%;font-size:12px;border-collapse:collapse;margin-bottom:16px">' +
        '<tr><td style="color:#64748b;padding:3px 0;width:110px">Número</td><td style="font-weight:600">'+piNumber+'</td></tr>' +
        '<tr><td style="color:#64748b;padding:3px 0">Entidad</td><td>'+entity+'</td></tr>' +
        '<tr><td style="color:#64748b;padding:3px 0">Cliente</td><td>'+piBillTo.split('\n')[0]+'</td></tr>' +
        '<tr><td style="color:#64748b;padding:3px 0">Total</td><td style="font-weight:600">'+piTotal+'</td></tr>' +
        '<tr><td style="color:#64748b;padding:3px 0;vertical-align:top">Items</td><td style="font-size:11px;color:#334155">'+piItemsSummary.replace(/\|/g,'<br>')+'</td></tr>' +
      '</table>' +
      '<div style="display:flex;gap:10px;justify-content:flex-end">' +
        '<button onclick="document.getElementById(\'pi-confirm-overlay\').remove()" style="padding:8px 20px;border:1px solid #ccc;border-radius:6px;background:#f1f5f9;cursor:pointer;font-size:13px">Cancelar</button>' +
        '<button id="pi-confirm-btn" style="padding:8px 20px;border:none;border-radius:6px;background:#1a3450;color:white;cursor:pointer;font-size:13px;font-weight:600">✓ Confirmar y generar PDF</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(confirmDiv);

  document.getElementById('pi-confirm-btn').onclick = function() {
    confirmDiv.remove();
    var pw = window.open('','_blank','width=900,height=1100');
    if (!pw) { alert('Por favor permite ventanas emergentes.'); return; }
    pw.document.write(html);
    pw.document.close();
    // Log to sheet AFTER PDF is opened
    piLogProforma(entity, piNumber, piBillTo, piAgent, piTotal, piItemsSummary);
  };
}

<div id="float-scroll"><div id="float-scroll-inner"></div></div>



<script>
(function() {
  function setup() {
    var floatBar   = document.getElementById('float-scroll');
    var floatInner = document.getElementById('float-scroll-inner');
    var tblWrap    = document.getElementById('tbl-wrap');
    if (!floatBar || !floatInner || !tblWrap) return;

    function syncWidth() {
      var table = tblWrap.querySelector('table');
      if (table) floatInner.style.width = table.scrollWidth + 'px';
    }
    syncWidth();

    var syncing = false;

    floatBar.addEventListener('scroll', function() {
      if (syncing) return;
      syncing = true;
      tblWrap.scrollLeft = floatBar.scrollLeft;
      setTimeout(function(){ syncing = false; }, 20);
    });

    tblWrap.addEventListener('scroll', function() {
      if (syncing) return;
      syncing = true;
      floatBar.scrollLeft = tblWrap.scrollLeft;
      setTimeout(function(){ syncing = false; }, 20);
    });

    // Re-sync width when table re-renders
    var observer = new MutationObserver(syncWidth);
    var tbody = document.getElementById('tbody');
    if (tbody) observer.observe(tbody, { childList: true });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setup);
  } else {
    setTimeout(setup, 300);
  }
})();
</script>
